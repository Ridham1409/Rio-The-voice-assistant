# RIO v1 — Minimal Configuration

llm:
  base_url: "http://localhost:11434"
  model: "mistral"
  temperature: 0.0        # greedy decoding — fastest + most deterministic
  max_tokens: 60          # JSON reply is tiny; 60 tokens is plenty
  timeout: 90             # full timeout (retry attempt)
  fast_timeout: 20        # first-attempt timeout — returns fallback if exceeded

actions:
  chrome_path: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
  search_engine: "https://www.google.com/search?q="
  files_dir: "~/Desktop"  # default dir for created files

logging:
  level: "INFO"
